[phases.setup]
nixPkgs = ["nodejs_22", "chromium", "nss", "freetype", "harfbuzz", "ca-certificates", "ttf-opensans", "glib", "nspr", "at-spi2-atk", "cups", "libdrm", "expat", "libxcb", "libxkbcommon", "mesa", "libGL"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
